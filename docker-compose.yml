services:
  # MongoDB - Document database for sensor data
  mongodb:
    image: mongo:7.0
    container_name: iot_mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:?set MONGO_ROOT_USERNAME in .env}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:?set MONGO_ROOT_PASSWORD in .env}
      - MONGO_INITDB_DATABASE=${MONGO_DATABASE:-iot_data}
    volumes:
      - mongodb_data:/data/db
    networks:
      - iot_network
    command: mongod --auth

  # MongoDB Express - Web-based MongoDB admin interface
  mongo-express:
    image: mongo-express:1.0.0
    container_name: iot_mongo_express
    # mongo-express exits if MongoDB isn't accepting connections yet;
    # restart until the database is ready.
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_ROOT_USERNAME:?set MONGO_ROOT_USERNAME in .env}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_ROOT_PASSWORD:?set MONGO_ROOT_PASSWORD in .env}
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGO_ROOT_USERNAME:?set MONGO_ROOT_USERNAME in .env}:${MONGO_ROOT_PASSWORD:?set MONGO_ROOT_PASSWORD in .env}@mongodb:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGO_EXPRESS_BASICAUTH_USERNAME:?set MONGO_EXPRESS_BASICAUTH_USERNAME in .env}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_EXPRESS_BASICAUTH_PASSWORD:?set MONGO_EXPRESS_BASICAUTH_PASSWORD in .env}
    depends_on:
      - mongodb
    networks:
      - iot_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iot_backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://${MONGO_ROOT_USERNAME:?set MONGO_ROOT_USERNAME in .env}:${MONGO_ROOT_PASSWORD:?set MONGO_ROOT_PASSWORD in .env}@mongodb:27017/${MONGO_DATABASE:-iot_data}?authSource=admin
      - MONGODB_DATABASE=${MONGO_DATABASE:-iot_data}
    volumes:
      - ./backend:/app
    depends_on:
      - mongodb
    networks:
      - iot_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iot_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - iot_network

volumes:
  mongodb_data:

networks:
  iot_network:
    driver: bridge

